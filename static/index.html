<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AstraGraph</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.29.2/cytoscape.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" />
  <style>
    :root {
      --bg: #0d0d0f;
      --surface: #16181d;
      --border: #2a2d35;
      --text: #e2e8f0;
      --muted: #6b7280;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── header ── */
    header {
      height: 52px;
      min-height: 52px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 16px;
      background: var(--surface);
    }

    .logo {
      font-weight: 700;
      font-size: 15px;
      letter-spacing: -0.3px;
      color: #fff;
    }

    .logo span { color: #7c3aed; }

    header select {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 13px;
      cursor: pointer;
      outline: none;
    }

    .btn-ingest {
      margin-left: auto;
      background: #7c3aed;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-ingest:hover { background: #6d28d9; }

    /* ── main split ── */
    .main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ── chat panel ── */
    .chat-panel {
      width: 38%;
      min-width: 300px;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .msg { display: flex; flex-direction: column; gap: 6px; max-width: 100%; }

    .msg-user .bubble {
      align-self: flex-end;
      background: #7c3aed;
      color: #fff;
      border-radius: 16px 16px 4px 16px;
      padding: 10px 14px;
      font-size: 14px;
      max-width: 85%;
      word-break: break-word;
    }

    .msg-assistant .bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px 16px 16px 16px;
      padding: 12px 14px;
      font-size: 14px;
      line-height: 1.6;
      max-width: 100%;
      word-break: break-word;
    }

    /* markdown inside bubbles */
    .bubble p { margin-bottom: 8px; }
    .bubble p:last-child { margin-bottom: 0; }
    .bubble code {
      background: rgba(255,255,255,0.08);
      border-radius: 3px;
      padding: 1px 5px;
      font-size: 12px;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
    }
    .bubble pre {
      background: #0d0d0f;
      border-radius: 6px;
      padding: 10px;
      overflow-x: auto;
      margin: 8px 0;
    }
    .bubble pre code { background: none; padding: 0; font-size: 12px; }

    /* provenance badges */
    .provenance {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .badge {
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      border: 1.5px solid transparent;
      transition: opacity 0.15s, transform 0.1s;
      white-space: nowrap;
      font-family: 'JetBrains Mono', monospace;
    }
    .badge:hover { opacity: 0.85; transform: translateY(-1px); }

    /* typing indicator */
    .typing { display: flex; gap: 4px; align-items: center; padding: 4px 0; }
    .typing span {
      width: 6px; height: 6px;
      background: var(--muted);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-5px); }
    }

    /* input area */
    .input-area {
      border-top: 1px solid var(--border);
      padding: 12px 16px;
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    .input-area textarea {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 14px;
      resize: none;
      outline: none;
      min-height: 42px;
      max-height: 120px;
      line-height: 1.5;
      font-family: inherit;
      transition: border-color 0.15s;
    }
    .input-area textarea:focus { border-color: #7c3aed; }
    .input-area textarea::placeholder { color: var(--muted); }

    .btn-send {
      background: #7c3aed;
      border: none;
      border-radius: 8px;
      width: 40px;
      height: 40px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
      flex-shrink: 0;
    }
    .btn-send:hover { background: #6d28d9; }
    .btn-send:disabled { background: var(--border); cursor: not-allowed; }
    .btn-send svg { width: 16px; height: 16px; fill: #fff; }

    /* mode selector */
    .mode-select {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 12px;
      cursor: pointer;
      outline: none;
    }

    /* ── right panel ── */
    .right-panel {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    /* graph */
    #cy {
      width: 100%;
      height: 100%;
      background: var(--bg);
    }

    /* empty state overlay */
    .graph-empty {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      pointer-events: none;
    }
    .graph-empty .icon { font-size: 40px; opacity: 0.2; }
    .graph-empty p { color: var(--muted); font-size: 13px; }

    /* file viewer panel */
    .file-panel {
      position: absolute;
      inset: 0;
      background: var(--bg);
      display: none;
      flex-direction: column;
      z-index: 10;
    }
    .file-panel.open { display: flex; }

    .file-header {
      border-bottom: 1px solid var(--border);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
    }
    .file-header .path {
      font-size: 12px;
      color: var(--muted);
      font-family: monospace;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .file-header .line-range {
      font-size: 11px;
      color: #7c3aed;
      font-family: monospace;
    }
    .btn-close {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 5px;
      padding: 3px 10px;
      font-size: 12px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    .btn-close:hover { color: var(--text); border-color: var(--text); }

    .file-body {
      flex: 1;
      overflow-y: auto;
      padding: 0;
    }
    .file-body pre { margin: 0; border-radius: 0; }
    .file-body pre code.hljs { padding: 20px; font-size: 12px; line-height: 1.6; }

    /* line highlight inside code viewer */
    .hljs-highlighted-line {
      background: rgba(124, 58, 237, 0.18);
      display: block;
    }

    /* ── modal ── */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      width: 460px;
      max-width: 95vw;
    }
    .modal h2 { font-size: 16px; font-weight: 600; margin-bottom: 16px; }
    .modal input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 7px;
      padding: 10px 12px;
      font-size: 14px;
      outline: none;
      margin-bottom: 12px;
      transition: border-color 0.15s;
    }
    .modal input:focus { border-color: #7c3aed; }
    .modal input::placeholder { color: var(--muted); }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
    .btn-cancel {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 7px;
      padding: 8px 16px;
      font-size: 13px;
      cursor: pointer;
    }
    .btn-submit {
      background: #7c3aed;
      border: none;
      color: #fff;
      border-radius: 7px;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-submit:hover { background: #6d28d9; }
    .btn-submit:disabled { background: var(--border); cursor: not-allowed; }

    .progress-bar-wrap {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin-bottom: 12px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: #7c3aed;
      border-radius: 2px;
      width: 0%;
      transition: width 0.4s ease;
    }
    .progress-label { font-size: 12px; color: var(--muted); margin-bottom: 12px; min-height: 18px; }
  </style>
</head>
<body>

<!-- ── header ── -->
<header>
  <div class="logo">Astra<span>Graph</span></div>
  <select id="repo-select" onchange="onRepoChange(this.value)">
    <option value="">— select repo —</option>
  </select>
  <button class="btn-ingest" onclick="openIngestModal()">+ Ingest repo</button>
</header>

<!-- ── main ── -->
<div class="main">

  <!-- chat -->
  <div class="chat-panel">
    <div class="messages" id="messages">
      <div style="color: var(--muted); font-size: 13px; text-align: center; margin-top: 40px;">
        Ingest a repo, then ask anything about its code.
      </div>
    </div>

    <div class="input-area">
      <select class="mode-select" id="mode-select">
        <option value="">hybrid</option>
        <option value="graph">graph</option>
        <option value="vector">vector</option>
      </select>
      <textarea
        id="query-input"
        placeholder="Ask about the code…"
        rows="1"
        onkeydown="onKey(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button class="btn-send" id="send-btn" onclick="sendQuery()" title="Send">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>

  <!-- right panel -->
  <div class="right-panel">
    <div id="cy"></div>

    <div class="graph-empty" id="graph-empty">
      <div class="icon">⬡</div>
      <p>Graph loads after repo selection</p>
    </div>

    <!-- file viewer (shown on badge click) -->
    <div class="file-panel" id="file-panel">
      <div class="file-header">
        <span class="path" id="file-path"></span>
        <span class="line-range" id="file-lines"></span>
        <button class="btn-close" onclick="closeFilePanel()">↩ graph</button>
      </div>
      <div class="file-body" id="file-body"></div>
    </div>
  </div>

</div>

<!-- ── ingest modal ── -->
<div class="modal-backdrop" id="modal">
  <div class="modal">
    <h2>Ingest a repository</h2>
    <input type="text" id="github-url" placeholder="https://github.com/owner/repo" />
    <input type="text" id="repo-id-input" placeholder="repo-id (optional, defaults to repo name)" />
    <div class="progress-bar-wrap" id="progress-wrap" style="display:none">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
    <div class="progress-label" id="progress-label"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeIngestModal()">Cancel</button>
      <button class="btn-submit" id="ingest-btn" onclick="startIngest()">Ingest</button>
    </div>
  </div>
</div>

<script>
// ── state ────────────────────────────────────────────────────────────────────

let cy = null                    // Cytoscape instance
let currentRepoId = null         // selected repo
let nodeColorMap = {}            // uuid → hex color (shared between graph + badges)
let provenanceMap = {}           // uuid → provenance item (for file panel)
let busy = false                 // prevent double-send

const PALETTE = [
  "#7c3aed", "#0ea5e9", "#10b981",
  "#f59e0b", "#ef4444", "#ec4899", "#06b6d4"
]

// ── cytoscape init ────────────────────────────────────────────────────────────

function initCytoscape() {
  cy = cytoscape({
    container: document.getElementById("cy"),
    style: [
      {
        selector: "node",
        style: {
          "background-color": "#2a2d35",
          "border-color": "#4b5563",
          "border-width": 1.5,
          "label": "data(label)",
          "color": "#9ca3af",
          "font-size": "9px",
          "text-valign": "bottom",
          "text-margin-y": 4,
          "width": 18,
          "height": 18,
          "font-family": "JetBrains Mono, monospace",
          "text-max-width": "80px",
          "text-overflow-wrap": "ellipsis",
        }
      },
      {
        selector: "node.highlighted",
        style: {
          "border-width": 2.5,
          "width": 26,
          "height": 26,
          "color": "#e2e8f0",
          "font-size": "10px",
        }
      },
      {
        selector: "node.dimmed",
        style: {
          "opacity": 0.12,
        }
      },
      {
        selector: "edge",
        style: {
          "line-color": "#2a2d35",
          "target-arrow-color": "#2a2d35",
          "target-arrow-shape": "triangle",
          "curve-style": "bezier",
          "width": 1,
          "arrow-scale": 0.7,
          "opacity": 0.6,
        }
      },
      {
        selector: "edge.dimmed",
        style: { "opacity": 0.04 }
      },
      {
        selector: "edge.highlighted",
        style: {
          "line-color": "#4b5563",
          "target-arrow-color": "#4b5563",
          "opacity": 0.8,
          "width": 1.5,
        }
      }
    ],
    layout: { name: "cose", animate: false },
    wheelSensitivity: 0.3,
  })

  cy.on("tap", "node", function(evt) {
    const id = evt.target.id()
    const item = provenanceMap[id]
    if (item && item.full_body) openFilePanel(item)
  })
}

// ── graph loading ─────────────────────────────────────────────────────────────

async function loadGraph(repoId) {
  document.getElementById("graph-empty").style.display = "none"
  if (!cy) initCytoscape()

  try {
    const res = await fetch(`/graph/${repoId}?limit=500`)
    const data = await res.json()

    cy.elements().remove()

    const elements = [
      ...data.nodes.map(n => ({
        group: "nodes",
        data: { id: n.id, label: n.label, ...n }
      })),
      ...data.edges.map(e => ({
        group: "edges",
        data: { id: e.id, source: e.source, target: e.target }
      }))
    ]

    cy.add(elements)

    cy.layout({
      name: "cose",
      animate: true,
      animationDuration: 800,
      randomize: false,
      nodeRepulsion: 8000,
      idealEdgeLength: 60,
      edgeElasticity: 0.1,
      numIter: 500,
      fit: true,
      padding: 40,
    }).run()

  } catch (e) {
    console.error("Graph load failed", e)
  }
}

// ── query ─────────────────────────────────────────────────────────────────────

async function sendQuery() {
  const input = document.getElementById("query-input")
  const query = input.value.trim()
  if (!query || busy) return
  if (!currentRepoId) { alert("Select a repo first."); return }

  busy = true
  document.getElementById("send-btn").disabled = true
  input.value = ""
  autoResize(input)

  appendMessage("user", query)
  const typingId = appendTyping()

  const mode = document.getElementById("mode-select").value
  const body = { query, repo_id: currentRepoId, mode, top_k: 5 }

  // ── Phase 1: retrieve → animate graph ──
  try {
    const res = await fetch("/retrieve", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body)
    })
    const data = await res.json()
    const provenance = data.provenance || []

    // assign colors
    nodeColorMap = {}
    provenance.forEach((item, i) => {
      nodeColorMap[item.uuid] = PALETTE[i % PALETTE.length]
      provenanceMap[item.uuid] = item
    })

    highlightNodes(provenance.map(p => p.uuid))
  } catch(e) {
    console.error("Retrieve failed", e)
  }

  // ── Phase 2: synthesize ──
  try {
    const res = await fetch("/query", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body)
    })
    const data = await res.json()
    removeTyping(typingId)
    appendAnswer(data.answer, data.provenance || [])
  } catch(e) {
    removeTyping(typingId)
    appendMessage("assistant-error", "Request failed. Check the server.")
  }

  busy = false
  document.getElementById("send-btn").disabled = false
}

// ── graph highlight ───────────────────────────────────────────────────────────

function highlightNodes(uuids) {
  if (!cy || uuids.length === 0) return

  cy.batch(() => {
    cy.nodes().addClass("dimmed").removeClass("highlighted")
    cy.edges().addClass("dimmed").removeClass("highlighted")

    uuids.forEach(id => {
      const node = cy.$(`#${CSS.escape(id)}`)
      if (node.length === 0) return
      node.removeClass("dimmed").addClass("highlighted")
      node.style("background-color", nodeColorMap[id] || "#7c3aed")
      node.style("border-color", nodeColorMap[id] || "#7c3aed")

      // highlight connected edges
      node.connectedEdges().removeClass("dimmed").addClass("highlighted")
    })
  })

  // zoom to fit highlighted nodes
  const highlighted = cy.nodes(".highlighted")
  if (highlighted.length > 0) {
    cy.animate({
      fit: { eles: highlighted, padding: 80 },
      duration: 600,
      easing: "ease-in-out-cubic"
    })
  }
}

function resetHighlight() {
  if (!cy) return
  cy.nodes().removeClass("dimmed highlighted")
  cy.edges().removeClass("dimmed highlighted")
  cy.nodes().style("background-color", "#2a2d35")
  cy.nodes().style("border-color", "#4b5563")
  cy.animate({ fit: { eles: cy.elements(), padding: 40 }, duration: 400 })
}

// ── file panel ────────────────────────────────────────────────────────────────

function openFilePanel(item) {
  document.getElementById("file-path").textContent = item.file_path || ""
  document.getElementById("file-lines").textContent =
    item.line_start ? `lines ${item.line_start}–${item.line_end}` : ""

  const body = item.full_body || "// source not available"
  const highlighted = hljs.highlight(body, { language: "python", ignoreIllegals: true }).value

  // wrap lines so we can highlight the relevant range
  const lineStart = item.line_start || 1
  const lines = highlighted.split("\n").map((line, i) => {
    const cls = i === 0 ? ' class="hljs-highlighted-line"' : ""
    return `<span${cls}>${line}</span>`
  }).join("\n")

  document.getElementById("file-body").innerHTML =
    `<pre><code class="hljs language-python">${lines}</code></pre>`

  document.getElementById("file-panel").classList.add("open")
}

function closeFilePanel() {
  document.getElementById("file-panel").classList.remove("open")
}

// ── chat helpers ──────────────────────────────────────────────────────────────

function appendMessage(role, text) {
  const el = document.createElement("div")
  el.className = `msg msg-${role === "user" ? "user" : "assistant"}`
  el.innerHTML = `<div class="bubble">${role === "user" ? escHtml(text) : marked.parse(text)}</div>`
  document.getElementById("messages").appendChild(el)
  scrollChat()
}

function appendAnswer(answer, provenance) {
  const el = document.createElement("div")
  el.className = "msg msg-assistant"

  const bubble = document.createElement("div")
  bubble.className = "bubble"
  bubble.innerHTML = marked.parse(answer)

  if (provenance.length > 0) {
    const prov = document.createElement("div")
    prov.className = "provenance"
    provenance.forEach((item, i) => {
      const color = nodeColorMap[item.uuid] || PALETTE[i % PALETTE.length]
      const badge = document.createElement("span")
      badge.className = "badge"
      badge.textContent = item.name
      badge.style.backgroundColor = color + "26"   // 15% opacity fill
      badge.style.borderColor = color
      badge.style.color = color
      badge.title = item.file_path
      badge.onclick = () => openFilePanel(item)
      prov.appendChild(badge)
    })
    bubble.appendChild(prov)
  }

  el.appendChild(bubble)
  document.getElementById("messages").appendChild(el)
  scrollChat()
}

function appendTyping() {
  const id = "typing-" + Date.now()
  const el = document.createElement("div")
  el.className = "msg msg-assistant"
  el.id = id
  el.innerHTML = `<div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>`
  document.getElementById("messages").appendChild(el)
  scrollChat()
  return id
}

function removeTyping(id) {
  const el = document.getElementById(id)
  if (el) el.remove()
}

function scrollChat() {
  const m = document.getElementById("messages")
  m.scrollTop = m.scrollHeight
}

function escHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
}

// ── repo selector ─────────────────────────────────────────────────────────────

async function onRepoChange(repoId) {
  if (!repoId) return
  currentRepoId = repoId
  resetHighlight()
  await loadGraph(repoId)
}

// populate repo dropdown from a known-ingested list
// (we don't have a /repos endpoint yet — user can extend this)
// For now we also add any repo_id from completed ingest jobs stored locally.
const _knownRepos = JSON.parse(localStorage.getItem("knownRepos") || "[]")
function refreshRepoSelect() {
  const sel = document.getElementById("repo-select")
  sel.innerHTML = '<option value="">— select repo —</option>'
  _knownRepos.forEach(r => {
    const opt = document.createElement("option")
    opt.value = r; opt.textContent = r
    sel.appendChild(opt)
  })
}
refreshRepoSelect()

function addKnownRepo(repoId) {
  if (!_knownRepos.includes(repoId)) {
    _knownRepos.push(repoId)
    localStorage.setItem("knownRepos", JSON.stringify(_knownRepos))
    refreshRepoSelect()
  }
}

// ── ingest modal ──────────────────────────────────────────────────────────────

let _pollInterval = null

function openIngestModal() {
  document.getElementById("modal").classList.add("open")
  document.getElementById("github-url").focus()
  document.getElementById("progress-wrap").style.display = "none"
  document.getElementById("progress-label").textContent = ""
  document.getElementById("ingest-btn").disabled = false
  document.getElementById("ingest-btn").textContent = "Ingest"
}

function closeIngestModal() {
  document.getElementById("modal").classList.remove("open")
  if (_pollInterval) { clearInterval(_pollInterval); _pollInterval = null }
}

async function startIngest() {
  const url = document.getElementById("github-url").value.trim()
  if (!url) return
  const repoId = document.getElementById("repo-id-input").value.trim() || null

  document.getElementById("ingest-btn").disabled = true
  document.getElementById("ingest-btn").textContent = "Starting…"
  document.getElementById("progress-wrap").style.display = "block"
  document.getElementById("progress-label").textContent = "Connecting…"

  try {
    const res = await fetch("/ingest", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ github_url: url, repo_id: repoId })
    })
    const data = await res.json()
    if (!res.ok) {
      document.getElementById("progress-label").textContent = data.detail || "Error"
      document.getElementById("ingest-btn").disabled = false
      document.getElementById("ingest-btn").textContent = "Retry"
      return
    }
    pollIngest(data.job_id, data.repo_id)
  } catch(e) {
    document.getElementById("progress-label").textContent = "Network error"
    document.getElementById("ingest-btn").disabled = false
    document.getElementById("ingest-btn").textContent = "Retry"
  }
}

function pollIngest(jobId, repoId) {
  _pollInterval = setInterval(async () => {
    try {
      const res = await fetch(`/ingest/status/${jobId}`)
      const data = await res.json()

      document.getElementById("progress-label").textContent =
        data.status === "cloning"   ? "Cloning repository…" :
        data.status === "ingesting" ? `Ingesting — ${data.progress}` :
        data.status === "done"      ? "Done!" :
        data.error || data.status

      // parse "done/total" to move progress bar
      const match = data.progress.match(/(\d+)\/(\d+)/)
      if (match) {
        const pct = Math.round(parseInt(match[1]) / parseInt(match[2]) * 100)
        document.getElementById("progress-bar").style.width = pct + "%"
      }
      if (data.status === "done") {
        document.getElementById("progress-bar").style.width = "100%"
        clearInterval(_pollInterval)
        _pollInterval = null
        addKnownRepo(repoId)
        setTimeout(() => {
          closeIngestModal()
          // auto-select the new repo
          document.getElementById("repo-select").value = repoId
          onRepoChange(repoId)
        }, 800)
      }
      if (data.status === "failed") {
        clearInterval(_pollInterval)
        _pollInterval = null
        document.getElementById("ingest-btn").disabled = false
        document.getElementById("ingest-btn").textContent = "Retry"
      }
    } catch(e) { /* network hiccup, keep polling */ }
  }, 3000)
}

// ── keyboard ──────────────────────────────────────────────────────────────────

function onKey(e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault()
    sendQuery()
  }
}

function autoResize(el) {
  el.style.height = "auto"
  el.style.height = Math.min(el.scrollHeight, 120) + "px"
}
</script>
