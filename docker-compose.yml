services:

  neo4j:
    image: neo4j:5
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 1G
      NEO4J_dbms_memory_pagecache_size: 256m
    volumes:
      - neo4j_data:/data
    networks:
      - internal

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - internal

  api:
    build: .
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      LLM_PROVIDER: openai_compat
      LLM_MODEL: ${LLM_MODEL:-llama-3.3-70b-versatile}
      OPENAI_COMPAT_URL: https://api.groq.com/openai/v1
      OPENAI_COMPAT_APIKEY: ${GROQ_API_KEY}
      EMBED_MODEL: ${EMBED_MODEL:-all-MiniLM-L6-v2}
      COLLECTION: codebase
    volumes:
      - workspace:/workspace
    depends_on:
      - neo4j
      - qdrant
    networks:
      - internal

volumes:
  neo4j_data:
  qdrant_data:
  workspace:

networks:
  internal:
    driver: bridge
